# Federation-only CI pipeline template

variables:
  PYTHON_VERSION: "3.10"

stages:
  - test

federation_tests:
  stage: test
  image: registry.access.redhat.com/ubi9/python-311:latest
  script:
    - pip install -r requirements.txt
    - mkdir -p reports logs test-reports
    - |
      if [ -n "$KUBECONFIG_CONTENT" ]; then
        echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig-local
        export KUBECONFIG=/tmp/kubeconfig-local
      fi
    - |
      if [ -n "$REMOTE_KUBECONFIG_CONTENT" ]; then
        echo "$REMOTE_KUBECONFIG_CONTENT" > /tmp/kubeconfig-remote
        export REMOTE_KUBECONFIG=/tmp/kubeconfig-remote
      fi
    - >
      pytest tests/federation/ -v
      --junitxml=reports/junit-federation.xml
      --remote-kubeconfig=${REMOTE_KUBECONFIG}
  artifacts:
    when: always
    paths:
      - reports/
      - test-reports/
      - logs/
    reports:
      junit: reports/junit-federation.xml
    expire_in: 30 days
  tags:
    - kubernetes
