# ZTWIM Test Framework Configuration
# ===================================

# OpenShift Cluster Configuration
# --------------------------------
# KUBECONFIG can be provided via:
#   1. CLI argument: --kubeconfig /path/to/kubeconfig
#   2. Environment variable: export KUBECONFIG=/path/to/kubeconfig
#   3. Config file below (lowest priority)

openshift:
  kubeconfig: "${KUBECONFIG}"
  operator_namespace: "zero-trust-workload-identity-manager"

# ZTWIM Operator Installation Settings
# Used by --deployment-mode=bootstrap and operand deployment
ztwim:
  catalog_name: "redhat-operators"
  channel: "stable-v1"
  cluster_name: "${CLUSTER_NAME:-test01}"

  # Apps domain (auto-detected from cluster DNS if not set)
  app_domain: "${APP_DOMAIN}"

  # JWT Issuer endpoint (derived from app_domain if not set)
  jwt_issuer_endpoint: "${JWT_ISSUER_ENDPOINT}"

# Test Execution Settings
testing:
  # Polling interval for status checks in client.py (seconds)
  poll_interval: 5

# Dynamic Polling / Retry Configuration
# ======================================
# Each category can be tuned independently.
# Increase timeouts for slow clusters; decrease intervals for faster feedback.

polling:
  # Retry config for exec_in_pod operations (container not found, 500 errors)
  exec_retry:
    max_attempts: 6
    interval: 10
    backoff_factor: 1.0

  # Pod readiness checks (prerequisite tests, deploy waits)
  pod_readiness:
    timeout: 180
    interval: 10
    backoff_factor: 1.2

  # Component verification (SpireServer/Agent/CSI/OIDC StatefulSet/DaemonSet)
  component_verify:
    timeout: 120
    interval: 5
    backoff_factor: 1.5

  # Federation-specific operations (route, bundle sync, mTLS)
  federation:
    timeout: 300
    interval: 10
    backoff_factor: 1.5

  # OSSM cross-cluster federation (longer timeouts for multi-cluster ops)
  ossm_federation:
    timeout: 300
    interval: 10
    backoff_factor: 1.5

  # Operator readiness (CSV installed, deployment available)
  operator:
    timeout: 300
    interval: 10
    backoff_factor: 1.5

  # Cleanup / deletion waits
  cleanup:
    timeout: 180
    interval: 5
    backoff_factor: 1.0

# Logging
logging:
  level: "INFO"

  # Suppress noisy third-party loggers that dump huge API responses at DEBUG level.
  # Format: logger_name: LEVEL
  # Remove an entry or set to "DEBUG" to see its full output.
  suppressed_loggers:
    kubernetes.client.rest: "WARNING"
    urllib3: "WARNING"
