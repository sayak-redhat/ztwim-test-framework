# SpireServer sqlite datastore patch/manifest.
#
# This is reusable for scenarios that explicitly require in-cluster sqlite.
# Typically applied as a patch to existing SpireServer/cluster.

apiVersion: operator.openshift.io/v1alpha1
kind: SpireServer
metadata:
  name: cluster
spec:
  datastore:
    databaseType: sqlite3
    connectionString: "/run/spire/data/datastore.sqlite3"
    maxOpenConns: 100
    maxIdleConns: 2
    connMaxLifetime: 3600
