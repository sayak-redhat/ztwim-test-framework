# Allow router SA to read federation TLS secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: {{OPERATOR_NAMESPACE}}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - {{CERT_SECRET_NAME}}
    verbs:
      - get
      - list
      - watch
