# Bind secret reader role to openshift router service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-reader-binding
  namespace: {{OPERATOR_NAMESPACE}}
subjects:
  - kind: ServiceAccount
    name: router
    namespace: openshift-ingress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-reader
